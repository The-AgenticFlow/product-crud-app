version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: product_crud_db
    environment:
      POSTGRES_USER: ${DB_USER:-product_user}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-product_password}
      POSTGRES_DB: ${DB_NAME:-product_db}
    ports:
      - "${DB_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-product_user} -d ${DB_NAME:-product_db}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

volumes:
  postgres_data:
    driver: local
